dataset:
  # --- product: AgentBoardプロダクトに関する質問 ---
  - inputs:
      customer_name: '佐藤 健太'
      company_name: '株式会社テクノソリューション'
      content: |
        AgentBoardの導入を検討しております。
        現在社内のコミュニケーションツールとしてSlackを使用しておりますが、
        AgentBoardとのSlack連携の具体的な手順や設定方法について
        ご教示いただけますでしょうか。
        また、連携時にデータの同期頻度やリアルタイム通知の対応状況に
        ついても確認させてください。
    expected_outputs:
      topic: 'product'
      response_body: |
        株式会社テクノソリューション
        佐藤 健太様

        お問い合わせいただきありがとうございます。
        株式会社サンプルエージェントのカスタマーサポート担当でございます。

        AgentBoardのSlack連携についてご回答いたします。
        AgentBoardはSlack Appとして提供しており、ワークスペース管理者が
        管理画面より発行いただくAPIキーを設定いただくことで、
        数分でSlackチャンネルから直接AgentBoardをご利用いただけます。
        データ同期は標準でリアルタイム（メッセージ送信時にトリガー）となっており、
        ナレッジベースの再インデックスは1時間ごとのバッチ更新となります。

        詳細な手順書をお送りいたしますので、ご都合のよろしい日時をお知らせください。
        オンラインでのデモンストレーションも承っております。

        引き続き、何卒よろしくお願いいたします。

        株式会社サンプルエージェント
        カスタマーサポート

  - inputs:
      customer_name: '鈴木 美咲'
      company_name: '青葉テクノロジー株式会社'
      content: |
        貴社のAgentBoardの導入を検討しており、トライアルでのサポート体制について
        お伺いしたく、ご連絡いたしました。
        弊社は従業員約100名のSaaS企業で、社内ナレッジの検索・回答業務に
        AgentBoardを活用できないか検討を進めております。
        2週間程度のトライアル期間を設けて、実際の利用データを用いて
        精度や運用性を評価したいと考えております。
        トライアルが可能か、可能な場合のご支援内容、社内稟議で参考にできる
        比較資料や導入事例集の有無について、お伺いできればと存じます。
    expected_outputs:
      topic: 'product'
      response_body: |
        青葉テクノロジー株式会社
        鈴木 美咲様

        お問い合わせいただきありがとうございます。
        株式会社サンプルエージェントのカスタマーサポート担当でございます。

        AgentBoardのトライアルについてご案内いたします。
        通常2週間の無償トライアル期間をご用意しており、期間中は
        導入支援担当者が初期セットアップおよびプロンプトチューニングに関する
        ご相談を承っております。

        また、社内稟議用の比較資料および導入事例集（同規模のSaaS企業様の事例を含む）を
        ご用意しておりますので、別途お送りいたします。

        トライアル開始に向けたお打ち合わせの日程について、
        ご都合のよろしい候補日を3つほどお知らせいただけますと幸いです。

        何卒よろしくお願い申し上げます。

        株式会社サンプルエージェント
        カスタマーサポート

  - inputs:
      customer_name: '高橋 誠'
      company_name: '株式会社ミライ製薬'
      content: |
        AgentBoardの導入を検討中ですが、製薬業界という性質上、
        セキュリティ要件が厳しく、特に入力データの学習利用の有無、
        データの保管リージョン、SOC2やISO27001等の認証取得状況について
        確認させていただきたくご連絡いたしました。
    expected_outputs:
      topic: 'product'
      response_body: |
        株式会社ミライ製薬
        高橋 誠様

        お問い合わせいただきありがとうございます。
        株式会社サンプルエージェントのカスタマーサポート担当でございます。

        AgentBoardのセキュリティに関するご質問にお答えいたします。

        ・入力データの学習利用：お客様の入力データはモデルの再学習には一切利用いたしません。
        ・データ保管リージョン：標準で東京リージョン（AWS ap-northeast-1）に保管しております。
        ・認証取得状況：ISO27001を取得済み、SOC2 Type IIは現在審査中です。

        より詳細なセキュリティチェックシートをご用意しておりますので、
        別途お送りいたします。NDA締結後にホワイトペーパーの開示も可能です。

        ご不明な点がございましたら、お気軽にお問い合わせください。
        何卒よろしくお願い申し上げます。

        株式会社サンプルエージェント
        カスタマーサポート

  # --- development: AIエージェント開発支援に関する質問 ---
  - inputs:
      customer_name: '田中 大輔'
      company_name: '株式会社グローバルセールス'
      content: |
        社内のCRM（Salesforce）と連携して営業活動を支援するAIエージェントの
        開発を検討しています。
        商談メモの自動要約、次のアクション提案、顧客への返信ドラフト生成などを
        想定しています。
        カスタムエージェントの開発支援について、概算費用と期間を
        教えていただけますでしょうか。
    expected_outputs:
      topic: 'development'
      response_body: |
        株式会社グローバルセールス
        田中 大輔様

        お問い合わせいただきありがとうございます。
        株式会社サンプルエージェントの開発支援担当でございます。

        Salesforce連携の営業支援エージェント開発についてご回答いたします。

        ご想定の機能（商談メモ要約、次アクション提案、返信ドラフト生成）を
        含む標準的なPoC開発の場合、以下が目安となります。

        ・期間：約2〜3ヶ月（要件定義1ヶ月、開発・検証1〜2ヶ月）
        ・費用：500万円〜800万円（連携範囲・評価環境構築の有無により変動）

        本格運用に向けたフェーズ移行や保守運用についても、
        別途ご相談を承っております。

        まずは無料の初回ヒアリング（オンライン60分）にて、
        貴社のご要件を詳しく伺えればと存じます。
        ご都合のよろしい日時を3つほどお知らせください。

        何卒よろしくお願い申し上げます。

        株式会社サンプルエージェント
        開発支援チーム

  - inputs:
      customer_name: '伊藤 由紀'
      company_name: '日本ロジテック株式会社'
      content: |
        物流業界向けの問い合わせ対応AIエージェントの開発をご相談したく
        ご連絡いたしました。
        過去の対応履歴データ（約3万件）を活用してRAGを構築し、
        オペレーターの一次回答を支援する用途を想定しております。
        貴社で類似の開発実績はございますでしょうか。
        また、データ前処理から運用までを一括でお願いできるかも確認したいです。
    expected_outputs:
      topic: 'development'
      response_body: |
        日本ロジテック株式会社
        伊藤 由紀様

        お問い合わせいただきありがとうございます。
        株式会社サンプルエージェントの開発支援担当でございます。

        物流業界向けの問い合わせ対応AIエージェント開発についてご回答いたします。

        類似の実績として、運送・倉庫業のお客様にて過去問い合わせ履歴を活用した
        RAGベースのオペレーター支援システムを複数社構築しております。
        具体的な事例（業界・規模・効果）につきましては、別途資料をお送りいたします。

        また、データ前処理（クレンジング、チャンク分割、メタデータ付与）から
        ベクターストア構築、評価、運用監視までを一括でご支援可能です。
        必要に応じて、運用後の継続的な精度改善（プロンプトチューニング、
        評価データセット更新）もパートナーとして伴走いたします。

        まずはオンラインで貴社のご要件と現状の課題を伺えればと存じます。
        ご都合のよろしい日時をお知らせください。

        何卒よろしくお願い申し上げます。

        株式会社サンプルエージェント
        開発支援チーム

  - inputs:
      customer_name: '小林 拓也'
      company_name: '株式会社ノーススター'
      content: |
        自社プロダクトに組み込むAIエージェントのPoC開発をご相談したいです。
        要件はまだ固まっておらず、技術選定の段階から壁打ちしていただきたいと
        考えております。
        最短でいつ頃から着手可能か、また初回相談は無料か教えてください。
    expected_outputs:
      topic: 'development'
      response_body: |
        株式会社ノーススター
        小林 拓也様

        お問い合わせいただきありがとうございます。
        株式会社サンプルエージェントの開発支援担当でございます。

        PoC開発のご相談についてご回答いたします。

        初回相談（オンライン60分）は無料で承っております。
        要件が未確定の段階からの技術選定・アーキテクチャ検討も
        多く対応しておりますので、お気軽にご相談ください。

        現状、最短で2026年6月上旬から着手可能でございます。
        着手前の要件整理ワークショップ（2〜3回）を経て、
        PoC開発フェーズに移行する流れが標準的でございます。

        まずは初回相談の日程調整をさせていただければと存じます。
        ご都合のよろしい候補日を3つほどお知らせください。

        何卒よろしくお願い申し上げます。

        株式会社サンプルエージェント
        開発支援チーム

  # --- other: その他の問い合わせ ---
  - inputs:
      customer_name: '山田 翔太'
      company_name: ''
      content: |
        貴社の採用情報について教えてください。
        現在エンジニアとして転職活動中で、AI領域に強い関心があります。
        中途採用の募集ポジションや、選考フローを知りたいです。
    expected_outputs:
      topic: 'other'
      response_body: |
        山田 翔太様

        お問い合わせいただきありがとうございます。
        株式会社サンプルエージェントのカスタマーサポート担当でございます。

        弊社の採用情報につきましては、採用専用ページにて
        最新の募集ポジションおよび選考フローをご案内しております。
        本問い合わせ窓口では採用に関する詳細回答ができかねますため、
        恐れ入りますが下記の採用ページよりご応募・お問い合わせを
        お願いいたします。

        ・採用情報ページ：弊社コーポレートサイトの「採用情報」をご参照ください。

        ご検討いただきありがとうございます。
        何卒よろしくお願い申し上げます。

        株式会社サンプルエージェント
        カスタマーサポート

  - inputs:
      customer_name: '中村 真理子'
      company_name: '株式会社ビジネスメディア'
      content: |
        AI業界の動向に関する特集記事を企画しており、貴社代表への
        インタビュー取材をお願いできないかご相談したく、ご連絡いたしました。
        掲載予定媒体や想定スケジュールについては、別途資料をお送りいたします。
        まずは取材のご検討が可能かお伺いできれば幸いです。
    expected_outputs:
      topic: 'other'
      response_body: |
        株式会社ビジネスメディア
        中村 真理子様

        お問い合わせいただきありがとうございます。
        株式会社サンプルエージェントの広報担当でございます。

        この度は取材のご依頼をいただき、誠にありがとうございます。
        取材内容を確認のうえ、広報部門および代表のスケジュールを
        調整させていただきたく存じます。

        恐れ入りますが、企画書および掲載予定媒体・スケジュールに関する資料を
        本メールにご返信いただく形でお送りいただけますでしょうか。
        資料拝受後、1週間程度でご回答を差し上げる予定でございます。

        引き続き、何卒よろしくお願い申し上げます。

        株式会社サンプルエージェント
        広報

  # --- spam: スパム・営業メール（generated_draftはnullとなるためresponse_bodyは評価対象外） ---
  - inputs:
      customer_name: '営業 太郎'
      company_name: 'SEO対策センター'
      content: |
        貴社のWebサイトを拝見いたしました。
        現状ではGoogle検索で上位表示されておらず、機会損失が発生している
        可能性がございます。
        弊社のSEO対策サービスをご利用いただければ、3ヶ月で検索順位を
        大幅に改善することが可能です。
        初月無料キャンペーン中ですので、ぜひ一度お打ち合わせの機会を
        頂戴できませんでしょうか。
    expected_outputs:
      topic: 'spam'
      response_body: ''

  - inputs:
      customer_name: '田村'
      company_name: ''
      content: |
        高品質な被リンクを格安でご提供いたします！！
        SEO効果絶大、業界最安値保証！
        今だけ100本5,000円のキャンペーン中！
        詳細は下記URLからお問い合わせください。
        http://example-spam-link.invalid/promo
    expected_outputs:
      topic: 'spam'
      response_body: ''
